<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="app-version" content="0.3.2">
<title>華耀旋臨 自在律:Barcarolle</title>
<style>
  :root, html[data-theme="dark"] {
    color-scheme: dark;
    --bg: #0c0d11;
    --panel: #15171e;
    --panel-2: #1d2029;
    --border: #2e3140;
    --grid-line: #262a36;
    --text: #eceae2;
    --text-dim: #979aa6;
    --accent: #ff4d6d;
    --accent-2: #ffb62e;
    --gold: #ffb62e;
    --neon-a: #39ffb0;
    --neon-b: #4dc3ff;
    --tier-a1: #39ffb0;
    --tier-a2: #4dc3ff;
    --tier-a: #2ecc71;
    --tier-b: #4a90d9;
    --tier-c: #6b6f7a;
    --boat1: #f4f4f4;
    --boat2: #333333;
    --boat3: #e0453f;
    --boat4: #3778c2;
    --boat5: #e0c62e;
    --boat6: #3fae5c;
  }
  html[data-theme="light"] {
    color-scheme: light;
    --bg: #f2f1ec;
    --panel: #ffffff;
    --panel-2: #eceae2;
    --border: #d5d2c6;
    --grid-line: #ddd9cc;
    --text: #1b1c22;
    --text-dim: #6d707c;
    --accent: #d92b4e;
    --accent-2: #c07f00;
    --gold: #c07f00;
    --neon-a: #00b573;
    --neon-b: #0077cc;
    --tier-a1: #00b573;
    --tier-a2: #0077cc;
    --tier-a: #1a9e57;
    --tier-b: #2f6db0;
    --tier-c: #8a8d97;
    --boat1: #e8e8e8;
    --boat2: #333333;
    --boat3: #e0453f;
    --boat4: #3778c2;
    --boat5: #e0c62e;
    --boat6: #3fae5c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    font-size: 16px;
    line-height: 1.5;
    max-width: 100%;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }
  .num { font-family: "SF Mono", "Roboto Mono", ui-monospace, "SFMono-Regular", Menlo, monospace; font-variant-numeric: tabular-nums; }
  header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: blur(8px);
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  header h1 {
    margin: 0;
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 0.08em;
    line-height: 1.2;
  }
  header h1 .brand {
    display: inline-block;
    background: linear-gradient(92deg, var(--text) 5%, var(--gold) 55%, var(--accent) 95%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }
  header h1 .series {
    display: block;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-top: 3px;
  }
  #theme-toggle {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    border-radius: 4px; min-height: 40px; min-width: 44px; font-size: 18px; cursor: pointer;
    margin-left: 10px; flex-shrink: 0;
  }
  header .subtitle {
    margin-top: 4px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }
  header .subtitle .engine {
    color: var(--text);
    font-weight: 600;
  }
  main {
    padding: 12px 12px 40px;
    max-width: 640px;
    margin: 0 auto;
  }
  .date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 12px 0;
    flex-wrap: wrap;
  }
  .date-row input[type="date"] {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 8px;
    font-size: 16px;
    min-height: 44px;
    flex: 1;
    min-width: 150px;
  }
  .date-row button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 11px 18px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    min-height: 44px;
    cursor: pointer;
  }
  .date-row button:active { opacity: 0.8; }
  .status-line {
    font-size: 14px;
    color: var(--text-dim);
    margin: 8px 0 12px;
    line-height: 1.6;
  }
  .status-line.warn { color: var(--accent-2); }
  .status-line.err { color: var(--accent); }
  .race-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .race-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 14px 4px;
    min-height: 56px;
    text-align: center;
    cursor: pointer;
    font-size: 17px;
    font-weight: 600;
  }
  .race-btn.selected {
    border-color: var(--accent);
    background: var(--panel-2);
    color: var(--accent-2);
  }
  .race-btn .tier-mini {
    display: block;
    font-size: 12px;
    margin-top: 3px;
    font-weight: 400;
    color: var(--text-dim);
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .panel h2 {
    margin: 0 0 4px;
    font-size: 18px;
  }
  .panel .meta {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .tier-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    color: #0e0f13;
    margin-left: 6px;
  }
  .tier-badge.A { background: var(--tier-a); }
  .tier-badge.B { background: var(--tier-b); color: #fff; }
  .tier-badge.C { background: var(--tier-c); color: #fff; }
  .wind-info {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .wind-source {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 7px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    font-size: 11px;
    color: var(--text-dim);
    vertical-align: middle;
  }
  .boat-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .boat-num {
    width: 30px; height: 30px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700;
    flex-shrink: 0;
  }
  .boat-num.b1 { background: var(--boat1); color: #111; }
  .boat-num.b2 { background: var(--boat2); color: #fff; }
  .boat-num.b3 { background: var(--boat3); color: #fff; }
  .boat-num.b4 { background: var(--boat4); color: #fff; }
  .boat-num.b5 { background: var(--boat5); color: #111; }
  .boat-num.b6 { background: var(--boat6); color: #fff; }
  .boat-name {
    width: 92px;
    font-size: 15px;
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .boat-bar-wrap {
    flex: 1;
    background: var(--panel-2);
    border-radius: 6px;
    height: 20px;
    overflow: hidden;
    position: relative;
  }
  .boat-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 6px;
  }
  .boat-rank {
    width: 36px;
    text-align: right;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .contrib-marks {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 14px;
    margin: 4px 0 14px 40px;
    font-size: 15px;
  }
  .contrib-mark {
    display: inline-flex;
    align-items: baseline;
    gap: 3px;
  }
  .contrib-mark .cm-label {
    color: var(--text-dim);
    font-size: 13px;
  }
  .contrib-mark .cm-sym {
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
  }
  .cm-sym.lv-a { color: var(--tier-a); }         /* ◎ 強い */
  .cm-sym.lv-b { color: var(--text); }           /* ○ 標準 */
  .cm-sym.lv-c { color: var(--text-dim); }       /* △ 薄め */
  .cm-sym.lv-d { color: var(--accent); }         /* ✕ 弱い */
  .cm-sym.lv-none { color: var(--text-dim); opacity: 0.5; } /* － 欠損 */
  .contrib-ref-tag {
    color: var(--text-dim);
    opacity: 0.7;
    font-size: 12px;
    align-self: center;
  }
  /* 参考扱い（重み0の変数）: ラベルも記号もレベル色を打ち消して薄色に */
  .contrib-mark.ref { opacity: 0.7; }
  .contrib-mark.ref .cm-label,
  .contrib-mark.ref .cm-sym { color: var(--text-dim); }
  .contrib-legend {
    font-size: 12px;
    color: var(--text-dim);
    margin: 0 0 12px 40px;
    line-height: 1.5;
  }
  .basis-row {
    margin: 0 0 10px 40px;
    padding: 6px 10px;
    border-left: 3px solid var(--accent-2);
    background: rgba(224, 167, 46, 0.06);
    border-radius: 0 6px 6px 0;
  }
  .basis-summary {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }
  .basis-icon {
    color: var(--accent-2);
    font-weight: 700;
    margin-right: 4px;
  }
  .basis-detail summary {
    cursor: pointer;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    padding: 4px 0;
    min-height: 32px;
    display: flex;
    align-items: center;
  }
  .basis-breakdown {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
    margin-top: 2px;
    font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
  }
  .racer-card {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 8px;
    align-items: center;
    margin: 2px 0 16px 40px;
  }
  .racer-chip {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.4;
  }
  .racer-chip b {
    color: var(--text);
    font-size: 17px;
    font-weight: 700;
  }
  .racer-chip .chip-note {
    font-size: 11px;
    color: var(--text-dim);
  }
  .racer-chip.sparse {
    opacity: 0.55;
    font-size: 13px;
  }
  .bets-box {
    background: var(--panel-2);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    font-size: 17px;
    line-height: 2;
  }
  .bets-fold-line {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .bets-fold-count {
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .bets-total {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    font-size: 14px;
    color: var(--text-dim);
  }
  .bets-detail summary {
    cursor: pointer;
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 10px;
    padding: 8px 0;
    min-height: 44px;
    display: flex;
    align-items: center;
  }
  .bets-detail .bets-raw {
    margin-top: 6px;
    white-space: pre-wrap;
    user-select: all;
    font-size: 16px;
    line-height: 1.9;
  }
  .copy-btn {
    margin-top: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 15px;
    min-height: 44px;
    cursor: pointer;
  }
  .copy-btn.copied { color: var(--tier-a); border-color: var(--tier-a); }
  /* 展示ゲート: 展示タイム未取得レースの待機パネル・出走表簡易表示 */
  .exhibit-badge {
    display: inline-block;
    margin-left: 8px;
    padding: 2px 9px;
    border-radius: 999px;
    border: 1px solid var(--tier-a);
    color: var(--tier-a);
    font-size: 11px;
    font-weight: 600;
    vertical-align: middle;
  }
  .wait-panel {
    background: var(--panel-2);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 14px;
    margin: 4px 0 14px;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.7;
  }
  .wait-panel .wait-title {
    display: block;
    color: var(--accent-2);
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
  }
  .entry-list {
    margin: 2px 0 14px;
  }
  .entry-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .entry-name {
    font-size: 15px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .entry-class {
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  /* ===== Bento レイアウト（レース詳細） ===== */
  .race-head { display: flex; align-items: baseline; gap: 10px; margin: 8px 2px 12px; flex-wrap: wrap; }
  .race-head h2 { margin: 0; font-size: 18px; }
  .race-head .meta { font-size: 12px; color: var(--text-dim); }
  .bento {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .cell {
    background: var(--panel);
    border: 1px solid var(--grid-line);
    border-radius: 4px;
    padding: 12px;
    position: relative;
    transition: transform 0.15s ease, background 0.3s, border-color 0.3s;
    transform-style: preserve-3d;
    opacity: 0;
    transform: translateY(18px);
  }
  .cell.wide { grid-column: span 2; }
  .cell.shown {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.2,.8,.2,1), background 0.3s, border-color 0.3s;
  }
  .cell.pressed {
    transform: perspective(600px) rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)) scale(0.99);
    transition: transform 0.08s;
  }
  .cell .cell-label {
    font-size: 10px; letter-spacing: 0.18em; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 6px;
    font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
  }
  /* --- ティア主役マス --- */
  .tier-cell {
    border: 2px solid transparent;
    background:
      linear-gradient(var(--panel), var(--panel)) padding-box,
      linear-gradient(120deg, var(--tier-a1), var(--tier-a2), var(--accent)) border-box;
    overflow: hidden;
  }
  .tier-cell.tier-B {
    background:
      linear-gradient(var(--panel), var(--panel)) padding-box,
      linear-gradient(120deg, var(--tier-b), var(--tier-a2)) border-box;
  }
  .tier-cell.tier-C {
    background:
      linear-gradient(var(--panel), var(--panel)) padding-box,
      linear-gradient(120deg, var(--tier-c), var(--border)) border-box;
  }
  .tier-cell::after {
    content: "";
    position: absolute; inset: -60% auto auto -20%;
    width: 60%; height: 220%;
    background: linear-gradient(100deg, transparent, color-mix(in srgb, var(--tier-a1) 18%, transparent), transparent);
    transform: rotate(18deg);
    animation: sheen 4.5s ease-in-out infinite;
    pointer-events: none;
  }
  .tier-cell.tier-C::after { display: none; } /* Cは発光なし */
  @keyframes sheen { 0%,60% { left: -40%; } 100% { left: 120%; } }
  .tier-row { display: flex; align-items: center; gap: 12px; }
  .tier-glyph {
    font-size: 44px; font-weight: 900; line-height: 1;
    background: linear-gradient(135deg, var(--tier-a1), var(--tier-a2));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 0 12px color-mix(in srgb, var(--tier-a1) 45%, transparent));
    flex-shrink: 0;
  }
  .tier-cell.tier-B .tier-glyph {
    background: linear-gradient(135deg, var(--tier-b), var(--tier-a2));
    -webkit-background-clip: text; background-clip: text;
    filter: drop-shadow(0 0 10px color-mix(in srgb, var(--tier-b) 40%, transparent));
  }
  .tier-cell.tier-C .tier-glyph {
    background: none;
    -webkit-text-fill-color: var(--tier-c); color: var(--tier-c);
    filter: none;
  }
  .tier-desc { font-size: 13px; color: var(--text-dim); }
  .tier-desc b { color: var(--text); }
  .tier-desc .exhibit-inline { color: var(--tier-a); font-weight: 600; }
  /* --- 風・気象マス --- */
  .wind-value { font-size: 22px; font-weight: 700; line-height: 1.2; }
  .wind-value small { font-size: 13px; color: var(--text-dim); font-weight: 400; }
  .wind-note { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  /* --- スコア序列マス（バー成長） --- */
  .cell .bar-wrap { flex: 1; background: var(--panel-2); border-radius: 3px; height: 16px; overflow: hidden; }
  .cell .bar { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 3px; transition: width 0.8s cubic-bezier(.2,.8,.2,1); }
  .cell .boat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .cell .boat-num { width: 26px; height: 26px; border-radius: 3px; font-size: 14px; }
  .cell .boat-name { width: 78px; font-size: 13px; }
  .boat-score { width: 46px; text-align: right; font-size: 13px; color: var(--text-dim); flex-shrink: 0; }
  /* --- 選手名鑑マスの見出し行 --- */
  .racer-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .cell .racer-card { margin: 0; }
  /* --- 買い目マス --- */
  .bet-line { display: flex; justify-content: space-between; padding: 7px 2px; border-bottom: 1px dashed var(--grid-line); font-size: 15px; }
  .bet-line:last-child { border-bottom: none; }
  .bet-line .kind { color: var(--text-dim); font-size: 12px; align-self: center; }
  .bet-line b { letter-spacing: 0.1em; }
  .cell .bets-total { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--grid-line); font-size: 13px; color: var(--text-dim); }
  .cell .bets-detail summary { cursor: pointer; font-size: 13px; color: var(--text-dim); margin-top: 8px; padding: 6px 0; min-height: 40px; display: flex; align-items: center; }
  .cell .bets-raw { margin-top: 6px; white-space: pre-wrap; user-select: all; font-size: 15px; line-height: 1.9; }
  .cell .copy-btn { margin-top: 10px; }
  footer {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    padding: 20px 12px 30px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1><span class="brand">華耀旋臨</span><span class="series">自在律:Barcarolle</span></h1>
    <div class="subtitle"><span class="engine">TDM BtR</span> — Turn Dynamics Model, Built to Race ・ v<span id="app-version-label">0.3.2</span> ・ 戸田専用演算モデル（非公式・情報提供のみ）</div>
  </div>
  <button id="theme-toggle" aria-label="テーマ切替">☾</button>
</header>

<main>
  <div class="date-row">
    <input type="date" id="date-input">
    <button id="today-btn">今日</button>
    <button id="fetch-btn">取得</button>
  </div>
  <div class="status-line" id="status-line">日付を選んで「取得」を押してください。</div>

  <div class="race-grid" id="race-grid"></div>

  <div id="detail-container"></div>
</main>

<footer>
  データ源: BoatraceOpenAPI（programs / previews v3）。表示スコア・買い目は独自算出であり、公式・的中を保証するものではありません。
</footer>

<script>
(function () {
  'use strict';

  // ============================================================
  // 戸田専用予想ロジック（logic/toda_logic.mjs のインライン移植版）
  // 値を変える時は logic/toda_logic.mjs と両方更新すること。
  // ============================================================

  var COURSE_PRIOR_WIN_PCT = {
    1: 43.88297872340425,
    2: 17.154255319148938,
    3: 15.89095744680851,
    4: 12.367021276595745,
    5: 6.914893617021277,
    6: 3.789893617021277
  };

  var WEIGHTS = {
    course_prior: 2,
    loc_win: 1,
    nat_win: 1.5,
    motor_2r: 1,
    boat_2r: 0,
    exhibition: 1,
    class: 2
  };

  var TIER_THRESHOLDS = {
    q33: 9.560521526721155,
    q67: 12.618367981334869
  };

  var CONTRIB_LABELS = [
    { key: 'loc_win', label: '当地' },
    { key: 'nat_win', label: '全国' },
    { key: 'motor_2r', label: 'モーター' },
    { key: 'boat_2r', label: 'ボート' },
    { key: 'exhibition', label: '展示' },
    { key: 'class', label: '級別' }
  ];

  var CLASS_LEVEL = { B2: 1, B1: 2, A2: 3, A1: 4 };

  function classToLevel(cls) {
    return CLASS_LEVEL.hasOwnProperty(cls) ? CLASS_LEVEL[cls] : null;
  }

  var VARIABLE_GETTERS = [
    { key: 'course_prior', get: function (e) { return COURSE_PRIOR_WIN_PCT.hasOwnProperty(e.boat) ? COURSE_PRIOR_WIN_PCT[e.boat] : null; } },
    { key: 'loc_win', get: function (e) { return typeof e.loc_win === 'number' ? e.loc_win : null; } },
    { key: 'nat_win', get: function (e) { return typeof e.nat_win === 'number' ? e.nat_win : null; } },
    { key: 'motor_2r', get: function (e) { return typeof e.motor_2r === 'number' ? e.motor_2r : null; } },
    { key: 'boat_2r', get: function (e) { return typeof e.boat_2r === 'number' ? e.boat_2r : null; } },
    { key: 'exhibition', get: function (e) { return typeof e.exhibition === 'number' ? -e.exhibition : null; } },
    { key: 'class', get: function (e) { return classToLevel(e.class); } }
  ];

  function computeZScores(boats) {
    var z = {};
    VARIABLE_GETTERS.forEach(function (v) {
      var vals = boats.map(function (b) { return { boat: b.boat, v: v.get(b) }; });
      var hasNull = vals.some(function (x) { return x.v == null || Number.isNaN(x.v); });
      if (hasNull) {
        z[v.key] = null;
        return;
      }
      var mean = vals.reduce(function (s, x) { return s + x.v; }, 0) / vals.length;
      var variance = vals.reduce(function (s, x) { return s + Math.pow(x.v - mean, 2); }, 0) / vals.length;
      var std = Math.sqrt(variance);
      var zz = {};
      vals.forEach(function (x) { zz[x.boat] = std === 0 ? 0 : (x.v - mean) / std; });
      z[v.key] = zz;
    });
    return z;
  }

  function computeScores(boats) {
    var z = computeZScores(boats);
    var scores = {};
    boats.forEach(function (b) {
      var s = 0;
      VARIABLE_GETTERS.forEach(function (v) {
        var zz = z[v.key];
        if (zz == null) return;
        s += (WEIGHTS[v.key] || 0) * zz[b.boat];
      });
      scores[b.boat] = s;
    });
    return scores;
  }

  function rankBoats(scores) {
    return Object.keys(scores).map(Number).sort(function (a, b) {
      return scores[b] - scores[a] || a - b;
    });
  }

  // 表示専用: 各艇の変数ごとの「レース内z-score（生値）」を返す。
  // 全変数は「値が高いほど1着に近い」向きに統一済み（展示は符号反転済み）なので、
  // z-scoreが高い=そのレースの中で強い、と読める。欠損変数はレース全体でnull。
  // computeScores と同じ computeZScores を使うため、計算結果・買い目には一切影響しない。
  function computeZScoreTable(boats) {
    var z = computeZScores(boats);
    var table = {};
    boats.forEach(function (b) {
      var row = {};
      VARIABLE_GETTERS.forEach(function (v) {
        var zz = z[v.key];
        row[v.key] = zz == null ? null : zz[b.boat];
      });
      table[b.boat] = row;
    });
    return table;
  }

  // z-scoreの4段階記号化の閾値（±0.8。scripts/check_zlevel_distribution.mjsで分布確認済み）。
  var Z_LEVEL_THRESHOLDS = { high: 0.8, low: -0.8 };

  // z-scoreを ◎○△✕ の4段階記号＋レベルクラスに変換する（表示専用）。
  // z>=high → ◎(強い) / 0<=z<high → ○ / low<=z<0 → △ / z<low → ✕(弱い) / 欠損 → －。
  function zLevelMark(z) {
    if (z == null || Number.isNaN(z)) return { sym: '－', lv: 'lv-none' };
    if (z >= Z_LEVEL_THRESHOLDS.high) return { sym: '◎', lv: 'lv-a' };
    if (z >= 0) return { sym: '○', lv: 'lv-b' };
    if (z >= Z_LEVEL_THRESHOLDS.low) return { sym: '△', lv: 'lv-c' };
    return { sym: '✕', lv: 'lv-d' };
  }

  // 表示専用: 各艇のスコアを変数ごとの寄与（weight × z-score）に分解する。
  // computeScores と同一の z-score・重みを使うため、寄与の合計は必ずスコアと一致する。
  // 計算結果・買い目には一切影響しない（logic/toda_logic.mjs の computeContributions と同一）。
  function computeContributions(boats) {
    var z = computeZScores(boats);
    var contributions = {};
    boats.forEach(function (b) {
      var c = {};
      VARIABLE_GETTERS.forEach(function (v) {
        var zz = z[v.key];
        c[v.key] = zz == null ? 0 : (WEIGHTS[v.key] || 0) * zz[b.boat];
      });
      contributions[b.boat] = c;
    });
    return contributions;
  }

  // 根拠サマリー用の変数ラベル（course_priorは艇番ベースのコース事前分布なので「艇番」）。
  var VAR_LABELS = {
    course_prior: '艇番', loc_win: '当地', nat_win: '全国',
    motor_2r: 'モーター', boat_2r: 'ボート', exhibition: '展示', class: '級別'
  };

  // 最大寄与の絶対値がこの値未満なら「突出項目なし（総合力）」とする。
  // scripts/check_basis_threshold（分析）でfixtures上、この閾値だと総合力判定は約4.7%の艇に発火。
  var BASIS_FLAT_THRESHOLD = 1.0;

  // 1艇分の寄与から「根拠」を組む（表示専用）。重み0の変数(boat_2r)は寄与0のため自然に除外。
  // 返り値: { summary: 文字列, breakdown: 文字列 }。
  function buildBasis(contribOfBoat, score) {
    var entries = [];
    VARIABLE_GETTERS.forEach(function (v) {
      if (!(WEIGHTS[v.key] > 0)) return; // 重み0(=予想に不使用)は根拠から除外
      var c = contribOfBoat[v.key] || 0;
      entries.push({ key: v.key, label: VAR_LABELS[v.key] || v.key, c: c });
    });

    var maxAbs = 0;
    entries.forEach(function (e) { if (Math.abs(e.c) > maxAbs) maxAbs = Math.abs(e.c); });

    var summary;
    if (maxAbs < BASIS_FLAT_THRESHOLD) {
      summary = '突出項目なし（総合力）';
    } else {
      var positives = entries.filter(function (e) { return e.c > 0; })
        .sort(function (a, b) { return b.c - a.c; });
      var negatives = entries.filter(function (e) { return e.c < 0; })
        .sort(function (a, b) { return a.c - b.c; });
      var parts = [];
      if (positives.length) {
        var posTop = positives.slice(0, 2).map(function (e) { return e.label; });
        parts.push('⬆ ' + posTop.join('・') + 'が押し上げ');
      }
      if (negatives.length) {
        parts.push('⬇ ' + negatives[0].label + 'が重荷');
      }
      summary = parts.join(' ／ ');
    }

    // 数値内訳: 寄与が0でない項目を降順に「ラベル ±x.x」で並べ、末尾に = スコア。
    var nonZero = entries.filter(function (e) { return e.c !== 0; })
      .sort(function (a, b) { return b.c - a.c; });
    var breakdown = nonZero.map(function (e) {
      var sign = e.c >= 0 ? '+' : '-';
      return e.label + ' ' + sign + Math.abs(e.c).toFixed(1);
    }).join(' ／ ') + ' ＝ スコア ' + score.toFixed(1);

    return { summary: summary, breakdown: breakdown };
  }

  function computeConfidence(scores, ranked) {
    var s = ranked.map(function (b) { return scores[b]; });
    var top1Minus2 = s[0] - s[1];
    var top3Mean = (s[0] + s[1] + s[2]) / 3;
    var bottom3Mean = (s[3] + s[4] + s[5]) / 3;
    return top1Minus2 + (top3Mean - bottom3Mean);
  }

  function tierFromConfidence(conf) {
    if (conf <= TIER_THRESHOLDS.q33) return 'C';
    if (conf <= TIER_THRESHOLDS.q67) return 'B';
    return 'A';
  }

  function buildBets(ranked) {
    var r1 = ranked[0], r2 = ranked[1], r3 = ranked[2], r4 = ranked[3];
    var perms = [];
    function permute(arr, prefix) {
      prefix = prefix || [];
      if (arr.length === 0) {
        perms.push(prefix);
        return;
      }
      for (var i = 0; i < arr.length; i++) {
        var rest = arr.slice(0, i).concat(arr.slice(i + 1));
        permute(rest, prefix.concat([arr[i]]));
      }
    }
    permute([r1, r2, r3]);
    return perms.concat([[r1, r2, r4], [r1, r4, r2]]);
  }

  function predictRace(boats) {
    if (!Array.isArray(boats) || boats.length !== 6) {
      throw new Error('predictRace: boats must be an array of exactly 6 entries');
    }
    var scores = computeScores(boats);
    var ranked = rankBoats(scores);
    var bets = buildBets(ranked).map(function (combo) { return combo.join('-'); });
    var conf = computeConfidence(scores, ranked);
    var tier = tierFromConfidence(conf);
    return { scores: scores, ranked: ranked, bets: bets, confidence: conf, tier: tier };
  }

  // ============================================================
  // 選手名鑑の表示フォーマッタ（logic/racer_profile_display.mjs のインライン移植版）
  // 表示専用。predictRace・買い目ロジックには一切関与しない。
  // 値を変える時は logic/racer_profile_display.mjs と両方更新すること。
  // ============================================================

  function pickAssumedCourse(boatNumber, previewCourseNumber) {
    return typeof previewCourseNumber === 'number' ? previewCourseNumber : boatNumber;
  }

  function fmtPct(v) {
    return v == null ? '-' : Math.round(v) + '%';
  }

  function fmtSt(v) {
    if (v == null) return 'なし';
    var neg = v < 0;
    var abs = Math.abs(v).toFixed(2);
    var trimmed = abs.replace(/^0/, '');
    return (neg ? '-' : '') + trimmed;
  }

  function formatRacerLine(profile, assumedCourse, courseSparseThreshold) {
    courseSparseThreshold = courseSparseThreshold == null ? 3 : courseSparseThreshold;
    if (!profile || !profile.starts || profile.starts === 0) {
      return '戸田初参戦(直近1年)';
    }
    var parts = [];
    parts.push('戸田' + profile.starts + '走 1着' + fmtPct(profile.win1Pct));

    var cs = profile.byCourse && profile.byCourse[String(assumedCourse)];
    if (cs && cs.starts >= courseSparseThreshold) {
      parts.push(assumedCourse + 'コース時 2連率' + fmtPct(cs.top2Pct) + ' 3連率' + fmtPct(cs.top3Pct));
    } else {
      parts.push(assumedCourse + 'コース時 データ僅少' + (cs ? '(' + cs.starts + '走)' : '(0走)'));
    }

    parts.push('平均ST ' + fmtSt(profile.avgSt));
    parts.push('F' + profile.fCount + '(戸田実績)');

    return parts.join(' / ');
  }

  // 選手名鑑を数値強調のチップ列としてHTML化する（表示専用。UIの可読性向上用）。
  // 値は全て数値・固定文字のためエスケープ不要。
  function renderRacerCard(profile, assumedCourse) {
    if (!profile || !profile.starts || profile.starts === 0) {
      return '<div class="racer-card"><span class="racer-chip sparse">戸田初参戦(直近1年)</span></div>';
    }
    var h = '<div class="racer-card">';
    h += '<span class="racer-chip">戸田 <b>' + profile.starts + '</b>走</span>';
    h += '<span class="racer-chip">1着 <b>' + fmtPct(profile.win1Pct) + '</b></span>';

    var cs = profile.byCourse && profile.byCourse[String(assumedCourse)];
    if (cs && cs.starts >= 3) {
      h += '<span class="racer-chip">' + assumedCourse + 'コース 2連<b>' + fmtPct(cs.top2Pct) + '</b> 3連<b>' + fmtPct(cs.top3Pct) + '</b></span>';
    } else {
      h += '<span class="racer-chip sparse">' + assumedCourse + 'コース データ僅少' + (cs ? '(' + cs.starts + '走)' : '(0走)') + '</span>';
    }

    h += '<span class="racer-chip">平均ST <b>' + fmtSt(profile.avgSt) + '</b></span>';
    h += '<span class="racer-chip">F<b>' + profile.fCount + '</b><span class="chip-note">(戸田実績)</span></span>';
    h += '</div>';
    return h;
  }

  // ============================================================
  // 買い目畳み表記（logic/fold_bets.mjs のインライン移植版）
  // 表示専用。買い目の中身・計算ロジックには一切影響しない。
  // 値を変える時は logic/fold_bets.mjs と両方更新すること。
  // ============================================================

  function uniqueBoatsFromCombos(combos) {
    var set = {};
    combos.forEach(function (c) { c.forEach(function (b) { set[b] = true; }); });
    return Object.keys(set).map(Number).sort(function (a, b) { return a - b; });
  }

  function allNonEmptySubsets(arr) {
    var result = [];
    var n = arr.length;
    for (var mask = 1; mask < (1 << n); mask++) {
      var subset = [];
      for (var i = 0; i < n; i++) {
        if (mask & (1 << i)) subset.push(arr[i]);
      }
      result.push(subset);
    }
    return result;
  }

  function findBestCrossGroup(combos) {
    var boats = uniqueBoatsFromCombos(combos);
    var subsets = allNonEmptySubsets(boats);
    var setStr = {};
    combos.forEach(function (c) { setStr[c.join('-')] = true; });
    var best = null;

    subsets.forEach(function (s1) {
      subsets.forEach(function (s2) {
        subsets.forEach(function (s3) {
          var product = [];
          s1.forEach(function (a) {
            s2.forEach(function (b) {
              if (b === a) return;
              s3.forEach(function (c) {
                if (c === a || c === b) return;
                product.push([a, b, c]);
              });
            });
          });
          if (product.length < 2) return;
          var allPresent = product.every(function (p) { return setStr[p.join('-')]; });
          if (!allPresent) return;
          if (!best || product.length > best.combos.length) {
            best = { pos1: s1, pos2: s2, pos3: s3, combos: product };
          }
        });
      });
    });
    return best;
  }

  function arraysEqual(a, b) {
    return a.length === b.length && a.every(function (v, i) { return v === b[i]; });
  }

  function formatGroup(g) {
    var s1 = g.pos1.slice().sort(function (a, b) { return a - b; });
    var s2 = g.pos2.slice().sort(function (a, b) { return a - b; });
    var s3 = g.pos3.slice().sort(function (a, b) { return a - b; });
    var count = g.combos.length;
    var isBox = arraysEqual(s1, s2) && arraysEqual(s2, s3) && s1.length === 3 && count === 6;
    var label = isBox ? s1.join('') + ' BOX' : s1.join('') + '-' + s2.join('') + '-' + s3.join('');
    return { label: label, count: count, combos: g.combos.map(function (c) { return c.join('-'); }) };
  }

  function foldBets(bets, maxGroups) {
    maxGroups = maxGroups || 3;
    var combos = bets.map(function (s) { return s.split('-').map(Number); });
    var remaining = combos.slice();
    var groups = [];

    while (remaining.length > 1 && groups.length < maxGroups) {
      var found = findBestCrossGroup(remaining);
      if (!found || found.combos.length < 2) break;
      groups.push(found);
      var used = {};
      found.combos.forEach(function (c) { used[c.join('-')] = true; });
      remaining = remaining.filter(function (c) { return !used[c.join('-')]; });
    }

    return {
      groups: groups.map(formatGroup),
      leftover: remaining.map(function (c) { return c.join('-'); }),
      total: bets.length
    };
  }

  // ============================================================
  // BoatraceOpenAPI 連携
  // ============================================================

  var TODA_STADIUM = 2;
  var CLASS_NUMBER_TO_LABEL = { 1: 'A1', 2: 'A2', 3: 'B1', 4: 'B2' };

  function todayJst() {
    // デバイスのタイムゾーンに依らずJSTでの日付文字列(YYYY-MM-DD)を返す
    var fmt = new Intl.DateTimeFormat('sv-SE', { timeZone: 'Asia/Tokyo' });
    return fmt.format(new Date()); // sv-SEロケールはYYYY-MM-DD形式
  }

  // 展示反映バッジ用の現在時刻(JST, HH:MM)。展示タイム取得時刻の保持に使う（表示専用）。
  function nowHhmm() {
    var fmt = new Intl.DateTimeFormat('sv-SE', { timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit' });
    return fmt.format(new Date());
  }

  function dateToCompact(dateStr) {
    return dateStr.replace(/-/g, '');
  }

  function programsUrl(dateStr) {
    var year = dateStr.slice(0, 4);
    return 'https://boatraceopenapi.github.io/programs/v3/' + year + '/' + dateToCompact(dateStr) + '.json';
  }

  function previewsUrl(dateStr) {
    var year = dateStr.slice(0, 4);
    return 'https://boatraceopenapi.github.io/previews/v3/' + year + '/' + dateToCompact(dateStr) + '.json';
  }

  // programsのレスポンスは日付の新しさにより形が変わる:
  // 直近の日付は {today:{programs:[...]}, yesterday:{programs:[...]}}、
  // 過去の日付は {programs:[...]} のフラット形式。両方に対応し、
  // date一致 かつ stadium_number===2 のレースだけを抽出する。
  function extractProgramsForDate(data, dateStr) {
    var pools = [];
    if (data && Array.isArray(data.programs)) pools = pools.concat(data.programs);
    if (data && data.today && Array.isArray(data.today.programs)) pools = pools.concat(data.today.programs);
    if (data && data.yesterday && Array.isArray(data.yesterday.programs)) pools = pools.concat(data.yesterday.programs);
    return pools.filter(function (p) { return p.date === dateStr && p.stadium_number === TODA_STADIUM; });
  }

  function extractPreviewsForDate(data, dateStr) {
    var pools = [];
    if (data && Array.isArray(data.previews)) pools = pools.concat(data.previews);
    if (data && data.today && Array.isArray(data.today.previews)) pools = pools.concat(data.today.previews);
    if (data && data.yesterday && Array.isArray(data.yesterday.previews)) pools = pools.concat(data.yesterday.previews);
    return pools.filter(function (p) { return p.date === dateStr && p.stadium_number === TODA_STADIUM; });
  }

  function programBoatToInput(pb) {
    return {
      boat: pb.racer_boat_number,
      loc_win: typeof pb.racer_local_top_1_percent === 'number' ? pb.racer_local_top_1_percent : null,
      nat_win: typeof pb.racer_national_top_1_percent === 'number' ? pb.racer_national_top_1_percent : null,
      motor_2r: typeof pb.racer_assigned_motor_top_2_percent === 'number' ? pb.racer_assigned_motor_top_2_percent : null,
      boat_2r: typeof pb.racer_assigned_boat_top_2_percent === 'number' ? pb.racer_assigned_boat_top_2_percent : null,
      exhibition: null, // previewsが取れた場合に後で上書きする
      class: CLASS_NUMBER_TO_LABEL.hasOwnProperty(pb.racer_class_number) ? CLASS_NUMBER_TO_LABEL[pb.racer_class_number] : null,
      name: pb.racer_name || ('' + pb.racer_boat_number + '号艇'),
      // 以下は表示専用の付加情報。predictRace（VARIABLE_GETTERS）は参照しない。
      racerNumber: typeof pb.racer_number === 'number' ? pb.racer_number : null,
      flyingCountCurrent: typeof pb.racer_flying_count === 'number' ? pb.racer_flying_count : null,
      assumedCourse: null // previewsが取れた場合に後で上書きする（無ければ艇番にフォールバック表示）
    };
  }

  function applyExhibition(inputs, previewRace) {
    if (!previewRace || !previewRace.boats) return false;
    var applied = false;
    inputs.forEach(function (inp) {
      var pb = previewRace.boats[String(inp.boat)];
      if (pb && typeof pb.racer_exhibition_time === 'number') {
        inp.exhibition = pb.racer_exhibition_time;
        applied = true;
      }
      if (pb && typeof pb.racer_course_number === 'number') {
        inp.assumedCourse = pb.racer_course_number;
      }
    });
    return applied;
  }

  var WIND_DIR_LABELS = {
    1: '北', 2: '北北東', 3: '北東', 4: '東北東', 5: '東', 6: '東南東', 7: '南東', 8: '南南東',
    9: '南', 10: '南南西', 11: '南西', 12: '西南西', 13: '西', 14: '西北西', 15: '北西', 16: '北北西'
  };
  var WEATHER_LABELS = { 1: '晴', 2: '曇', 3: '雨', 4: '雪', 5: '霧', 6: '強風' };

  function windSummary(previewRace) {
    if (!previewRace) return null;
    var dirLabel = WIND_DIR_LABELS[previewRace.wind_direction_number] || '不明';
    var weatherLabel = WEATHER_LABELS[previewRace.weather_number] || '不明';
    return '天候: ' + weatherLabel + ' ／ 風速: ' + previewRace.wind_speed + 'm (' + dirLabel + ') ／ 波高: ' + previewRace.wave_height + 'cm';
  }

  // ============================================================
  // 直前情報（/api/beforeinfo, scripts/serve.mjs 経由）連携
  // ローカル中継サーバー未起動・取得失敗時は例外を投げず呼び出し元にfalseを返すのみ。
  // ============================================================

  function beforeInfoApiUrl(dateStr, raceNumber) {
    return 'api/beforeinfo?date=' + dateToCompact(dateStr) + '&race=' + raceNumber;
  }

  // 外部中継（ar-proxy/Render、GitHub Pages配信時用）。応答JSONはローカル中継と同一形。
  var BEFOREINFO_RELAY_BASE = 'https://ar-proxy.onrender.com/boat/beforeinfo';

  function beforeInfoRelayUrl(dateStr, raceNumber) {
    return BEFOREINFO_RELAY_BASE + '?date=' + dateToCompact(dateStr) + '&race=' + raceNumber;
  }

  // ローカル中継(serve.mjs)を先に試し、失敗時は外部中継へフォールバックする。
  // 外部はRender無料枠の目覚めで初回応答が遅いことがあるため30秒のタイムアウトを取る。
  function fetchBeforeInfoJson(dateStr, raceNumber, onFallback) {
    return fetch(beforeInfoApiUrl(dateStr, raceNumber))
      .then(function (res) {
        if (!res.ok) throw new Error('local HTTP ' + res.status);
        return res.json();
      })
      .catch(function () {
        if (onFallback) onFallback();
        var ctrl = typeof AbortController !== 'undefined' ? new AbortController() : null;
        var timer = ctrl ? setTimeout(function () { ctrl.abort(); }, 30000) : null;
        return fetch(beforeInfoRelayUrl(dateStr, raceNumber), ctrl ? { signal: ctrl.signal } : undefined)
          .then(function (res) {
            if (timer) clearTimeout(timer);
            return res.json();
          })
          .catch(function (err) {
            if (timer) clearTimeout(timer);
            throw err;
          });
      });
  }

  // 0やnaを消さないための欠損判定。windSpeed=0・waveHeight=0は正常値なので、
  // 欠損扱いは null / undefined のみとする（falsy判定は使わない）。
  function hasVal(v) {
    return v !== null && v !== undefined;
  }

  // 直前情報APIの天候文字列。方角(windDirectionLabel)は常時nullのため表示しない
  // （windDirectionIconNumberの生数値表示は混乱の元なので、方角対応表を作るまで省略）。
  function beforeInfoWindSummary(weather) {
    if (!weather) return null;
    var parts = [];
    parts.push('天候: ' + (hasVal(weather.weatherLabel) ? weather.weatherLabel : '不明'));
    parts.push('風速: ' + (hasVal(weather.windSpeed) ? weather.windSpeed + 'm' : '不明'));
    parts.push('波高: ' + (hasVal(weather.waveHeight) ? weather.waveHeight + 'cm' : '不明'));
    if (hasVal(weather.waterTemperature)) parts.push('水温: ' + weather.waterTemperature + '°');
    return parts.join(' ／ ');
  }

  // wind-info行のHTMLを組む。直前情報(beforeinfo)があればそちらを優先し、
  // 出所バッジ「公式直前」を付す。無ければOpenAPI previews由来を「OpenAPI」バッジで表示。
  // どちらも無ければ未取得メッセージ。
  function renderWindInfoHtml(race) {
    if (race.beforeInfoWeather) {
      var bs = beforeInfoWindSummary(race.beforeInfoWeather);
      return '<div class="wind-info">' + escapeHtml(bs || '') +
        '<span class="wind-source">公式直前</span></div>';
    }
    var wind = windSummary(race.previewRace);
    if (wind) {
      return '<div class="wind-info">' + escapeHtml(wind) +
        '<span class="wind-source">OpenAPI</span></div>';
    }
    return '<div class="wind-info">直前情報未取得のため風情報なし（出走表のみでスコア計算）</div>';
  }

  // 直前情報の展示タイムを race.boats に反映する（艇番一致のみ、値がnullの艇は据え置き）。
  // 既存のexhibition反映パス（applyExhibitionと同じ入力形）を再利用するだけで、
  // 買い目・寄与表示・選手名鑑のロジックには一切触れない。
  function mergeBeforeInfoExhibition(race, beforeInfoData) {
    if (!beforeInfoData || !Array.isArray(beforeInfoData.boats)) return false;
    var byBoat = {};
    beforeInfoData.boats.forEach(function (b) {
      if (b && b.boat != null) byBoat[b.boat] = b;
    });
    var applied = false;
    race.boats.forEach(function (inp) {
      var b = byBoat[inp.boat];
      if (b && typeof b.exhibitionTime === 'number') {
        inp.exhibition = b.exhibitionTime;
        applied = true;
      }
    });
    if (applied) {
      race.beforeInfoWeather = beforeInfoData.weather || null;
    }
    return applied;
  }

  // ============================================================
  // UI
  // ============================================================

  var state = {
    dateStr: todayJst(),
    races: [],       // [{number, title, gradeLabel, boats:[input,...], previewRace}]
    previewsOk: false,
    selectedRace: null,
    racerProfiles: null // data/fixtures/racer_profiles.json（表示専用）。取得失敗時はnullのまま非表示
  };

  // 選手名鑑（表示専用の実績データ）を一度だけ取得する。失敗しても本体機能に影響しないフォールバック。
  fetch('data/fixtures/racer_profiles.json')
    .then(function (res) { return res.ok ? res.json() : null; })
    .then(function (data) { state.racerProfiles = data; })
    .catch(function () { state.racerProfiles = null; });

  var dateInput = document.getElementById('date-input');
  var todayBtn = document.getElementById('today-btn');
  var fetchBtn = document.getElementById('fetch-btn');
  var statusLine = document.getElementById('status-line');
  var raceGrid = document.getElementById('race-grid');
  var detailContainer = document.getElementById('detail-container');

  dateInput.value = state.dateStr;

  // ダーク/ライト切替（html[data-theme]方式）。表示専用。
  var themeToggle = document.getElementById('theme-toggle');
  if (themeToggle) {
    themeToggle.addEventListener('click', function () {
      var root = document.documentElement;
      var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      this.textContent = next === 'dark' ? '☾' : '☀';
    });
  }

  function setStatus(msg, cls) {
    statusLine.textContent = msg;
    statusLine.className = 'status-line' + (cls ? ' ' + cls : '');
  }

  todayBtn.addEventListener('click', function () {
    state.dateStr = todayJst();
    dateInput.value = state.dateStr;
    loadDate(state.dateStr);
  });

  fetchBtn.addEventListener('click', function () {
    state.dateStr = dateInput.value || todayJst();
    loadDate(state.dateStr);
  });

  function loadDate(dateStr) {
    setStatus('取得中…');
    raceGrid.innerHTML = '';
    detailContainer.innerHTML = '';
    state.races = [];
    state.selectedRace = null;

    fetch(programsUrl(dateStr))
      .then(function (res) {
        if (!res.ok) throw new Error('programs HTTP ' + res.status);
        return res.json();
      })
      .then(function (progData) {
        var todaPrograms = extractProgramsForDate(progData, dateStr);
        if (todaPrograms.length === 0) {
          setStatus('本日戸田開催なし（' + dateStr + '）', 'warn');
          return null;
        }
        todaPrograms.sort(function (a, b) { return a.number - b.number; });

        // previewsは無くても出走表のみで動作させる
        return fetch(previewsUrl(dateStr))
          .then(function (res) { return res.ok ? res.json() : null; })
          .catch(function () { return null; })
          .then(function (prevData) {
            var previewsByRace = {};
            if (prevData) {
              extractPreviewsForDate(prevData, dateStr).forEach(function (p) {
                previewsByRace[p.number] = p;
              });
            }
            var previewsOk = Object.keys(previewsByRace).length > 0;
            state.previewsOk = previewsOk;

            state.races = todaPrograms.map(function (prog) {
              var inputs = prog.boats.map(programBoatToInput);
              var previewRace = previewsByRace[prog.number] || null;
              var previewApplied = applyExhibition(inputs, previewRace);
              return {
                number: prog.number,
                title: prog.title,
                subtitle: prog.subtitle,
                gradeLabel: prog.grade_label,
                dayLabel: prog.day_label,
                closedAt: prog.closed_at,
                boats: inputs,
                previewRace: previewRace,
                previewApplied: previewApplied, // OpenAPI previewsで既に展示タイムが反映済みか
                beforeInfoApplied: false, // /api/beforeinfoで直前情報を反映済みか
                exhibitionAt: previewApplied ? nowHhmm() : null // 展示タイム取得時刻(JST HH:MM)。展示反映バッジに使う
              };
            });

            renderRaceGrid();
            if (previewsOk) {
              setStatus('戸田' + todaPrograms.length + 'レース取得済み（直前情報あり、' + dateStr + '）');
            } else {
              setStatus('戸田' + todaPrograms.length + 'レース取得済み（直前情報は未取得のため出走表のみでスコア計算、' + dateStr + '）', 'warn');
            }
          });
      })
      .catch(function (err) {
        setStatus('取得エラー: ' + err.message, 'err');
      });
  }

  function renderRaceGrid() {
    raceGrid.innerHTML = '';
    state.races.forEach(function (r) {
      var btn = document.createElement('div');
      btn.className = 'race-btn';
      // 展示未取得レースはティア文字を出さず「待」を表示（展示前の予想を露出させない）。
      var miniLabel = exhibitionReady(r) ? predictRace(r.boats).tier : '待';
      btn.innerHTML = r.number + 'R<span class="tier-mini">' + miniLabel + '</span>';
      btn.addEventListener('click', function () {
        selectRace(r.number);
      });
      btn.dataset.raceNumber = r.number;
      raceGrid.appendChild(btn);
    });
  }

  function selectRace(number) {
    state.selectedRace = number;
    Array.prototype.forEach.call(raceGrid.children, function (el) {
      el.classList.toggle('selected', Number(el.dataset.raceNumber) === number);
    });
    var race = state.races.filter(function (r) { return r.number === number; })[0];
    if (!race) return;
    renderDetail(race);
  }

  function boatClass(boatNum) {
    return 'b' + boatNum;
  }

  // 展示ゲート判定: 6艇全ての展示タイム(数値)が揃っているか。
  // 揃うまでは予想（スコア序列・ティア・買い目・根拠・寄与記号）を非表示にする。
  // バックテスト成績は展示込みで計測されているため、展示前の予想は計測根拠を持たない。
  function exhibitionReady(race) {
    return race && Array.isArray(race.boats) && race.boats.length === 6 &&
      race.boats.every(function (b) {
        return typeof b.exhibition === 'number' && !Number.isNaN(b.exhibition);
      });
  }

  // Bentoマスのスクロール出現アニメ（60ms階段）＋スコアバー成長＋タッチ擬似3Dチルト。
  // 表示専用。renderDetail が詳細を差し替えるたびに新しい .cell 群へ結線し直す。
  function activateBento(container) {
    var cells = container.querySelectorAll('.cell');
    function growBars(cell) {
      Array.prototype.forEach.call(cell.querySelectorAll('.bar'), function (bar) {
        if (bar.dataset.w != null) bar.style.width = bar.dataset.w + '%';
      });
    }
    if (typeof IntersectionObserver === 'undefined') {
      Array.prototype.forEach.call(cells, function (c) { c.classList.add('shown'); growBars(c); });
      attachTilt(cells);
      return;
    }
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (!e.isIntersecting) return;
        e.target.classList.add('shown');
        growBars(e.target);
        io.unobserve(e.target);
      });
    }, { threshold: 0.15 });
    Array.prototype.forEach.call(cells, function (c, i) {
      c.style.transitionDelay = (i * 60) + 'ms';
      io.observe(c);
    });
    attachTilt(cells);
  }

  function attachTilt(cells) {
    Array.prototype.forEach.call(cells, function (c) {
      function tilt(ev) {
        var t = ev.touches ? ev.touches[0] : ev;
        var r = c.getBoundingClientRect();
        var dx = (t.clientX - r.left) / r.width - 0.5;
        var dy = (t.clientY - r.top) / r.height - 0.5;
        c.style.setProperty('--ry', (dx * 6) + 'deg');
        c.style.setProperty('--rx', (-dy * 6) + 'deg');
        c.classList.add('pressed');
      }
      function release() { c.classList.remove('pressed'); }
      c.addEventListener('touchstart', tilt, { passive: true });
      c.addEventListener('touchmove', tilt, { passive: true });
      c.addEventListener('touchend', release);
      c.addEventListener('touchcancel', release);
    });
  }

  // レース見出し（h2 + メタ行）。Bentoグリッドの上に置く。
  function renderRaceHead(race) {
    return '<div class="race-head"><h2>' + race.number + 'R' +
      (race.title ? ' ' + escapeHtml(race.title) : '') + '</h2>' +
      '<span class="meta">' +
      (race.gradeLabel ? escapeHtml(race.gradeLabel) + ' ／ ' : '') +
      (race.dayLabel ? escapeHtml(race.dayLabel) + ' ／ ' : '') +
      (race.subtitle ? escapeHtml(race.subtitle) + ' ／ ' : '') +
      '締切: ' + (race.closedAt ? escapeHtml(race.closedAt) : '不明') +
      '</span></div>';
  }

  // 風・気象マス（既存 renderWindInfoHtml の内容を収容）。
  function renderWindCell(race) {
    return '<div class="cell"><div class="cell-label">WIND ／ 気象</div>' +
      renderWindInfoHtml(race) + '</div>';
  }

  // 選手名鑑マス（1艇1マス、既存 racer-chip 流用）。艇番順に呼ぶ。
  function renderRacerCell(race, b) {
    var label = 'RACER ' + b.boat;
    var body;
    if (state.racerProfiles) {
      var profile = b && b.racerNumber != null ? state.racerProfiles[String(b.racerNumber)] : null;
      var assumedCourse = pickAssumedCourse(b.boat, b ? b.assumedCourse : null);
      body = renderRacerCard(profile, assumedCourse);
    } else {
      body = '<span class="racer-chip sparse">名鑑データ未取得</span>';
    }
    return '<div class="cell"><div class="cell-label">' + escapeHtml(label) + '</div>' +
      '<div class="racer-row"><div class="boat-num ' + boatClass(b.boat) + '">' + b.boat + '</div>' +
      '<span class="entry-name">' + escapeHtml(b && b.name ? b.name : ('' + b.boat)) + '</span>' +
      '<span class="entry-class">' + escapeHtml(b && b.class ? b.class : '-') + '</span></div>' +
      body + '</div>';
  }

  function renderDetail(race) {
    // 展示ゲート: 6艇全ての展示タイムが揃うまでは予想を非表示にする。
    var ready = exhibitionReady(race);
    if (ready && !race.exhibitionAt) race.exhibitionAt = nowHhmm();

    var html = renderRaceHead(race);
    html += '<div class="bento">';

    if (!ready) {
      // --- 展示待ち: WIND / STATUS / 待機マス + 選手名鑑マス（予想は非表示） ---
      html += renderWindCell(race);
      html += '<div class="cell"><div class="cell-label">STATUS</div>' +
        '<div class="beforeinfo-box">' +
        '<button class="copy-btn" id="beforeinfo-btn-' + race.number + '">直前情報を取る</button>' +
        '<div class="status-line" id="beforeinfo-status-' + race.number + '"></div>' +
        '</div></div>';
      html += '<div class="cell wide"><div class="cell-label">EXHIBITION GATE</div>' +
        '<div class="wait-panel"><span class="wait-title">展示待ち</span>' +
        '展示航走の公表後に予想を表示します（目安: 締切約30分前）。「直前情報を取る」で再取得できます。</div></div>';
      race.boats.forEach(function (b) { html += renderRacerCell(race, b); });
      html += '</div>';
      detailContainer.innerHTML = html;
      activateBento(detailContainer);
      bindDetailHandlers(race);
      return;
    }

    // ---- 展示が揃ったレース（予想表示） ----
    var pred = predictRace(race.boats);
    var scores = pred.scores;
    var scoreVals = Object.keys(scores).map(function (k) { return scores[k]; });
    var minS = Math.min.apply(null, scoreVals);
    var maxS = Math.max.apply(null, scoreVals);
    var range = maxS - minS || 1;

    var byBoat = {};
    race.boats.forEach(function (b) { byBoat[b.boat] = b; });

    // --- ティア主役マス（2列ぶち抜き） ---
    var tierNote = pred.tier === 'A' ? '選別対象レース' : (pred.tier === 'B' ? '中庸帯' : '低確度帯');
    html += '<div class="cell wide tier-cell tier-' + pred.tier + '">' +
      '<div class="cell-label">TIER JUDGE</div>' +
      '<div class="tier-row"><div class="tier-glyph">' + pred.tier + '</div>' +
      '<div class="tier-desc">確信度 <b class="num">' + pred.confidence.toFixed(2) + '</b>' +
      '（A閾値 <span class="num">' + TIER_THRESHOLDS.q67.toFixed(2) + '</span>）<br>' + tierNote +
      (race.exhibitionAt ? ' ・ <span class="exhibit-inline">展示反映 ' + escapeHtml(race.exhibitionAt) + '</span>' : '') +
      '</div></div></div>';

    // --- 風・気象マス + STATUSマス ---
    html += renderWindCell(race);
    html += '<div class="cell"><div class="cell-label">STATUS</div>' +
      '<div class="status-line">展示タイム取得済み。予想を表示しています。</div></div>';

    // --- スコア序列マス（2列ぶち抜き・バー成長） ---
    html += '<div class="cell wide"><div class="cell-label">SCORE ORDER</div>';
    pred.ranked.forEach(function (boatNum) {
      var b = byBoat[boatNum];
      var s = scores[boatNum];
      var widthPct = Math.max(4, ((s - minS) / range) * 100);
      html += '<div class="boat-row">' +
        '<div class="boat-num ' + boatClass(boatNum) + '">' + boatNum + '</div>' +
        '<div class="boat-name">' + escapeHtml(b && b.name ? b.name : ('' + boatNum)) + '</div>' +
        '<div class="bar-wrap"><div class="bar" data-w="' + widthPct + '"></div></div>' +
        '<div class="boat-score num">' + s.toFixed(2) + '</div>' +
        '</div>';
    });
    html += '</div>';

    // --- 根拠マス（2列ぶち抜き・寄与記号列 + 根拠サマリー） ---
    var zTable = computeZScoreTable(race.boats);
    var contributions = computeContributions(race.boats);
    // 重み0の変数は「参考」扱い（予想スコアに不使用）。WEIGHTSを見て動的に判定するため、
    // 将来重みが変われば自動的に通常表示へ戻る（ハードコードしない）。
    function isReferenceVar(key) {
      var w = WEIGHTS[key];
      return !(typeof w === 'number' && w > 0);
    }
    var hasReferenceVar = CONTRIB_LABELS.some(function (cl) { return isReferenceVar(cl.key); });
    html += '<div class="cell wide"><div class="cell-label">READ ／ 根拠</div>';
    html += '<div class="contrib-legend">◎=レース内で強い ○=やや上 △=やや下 ✕=弱い（各項目の艇間相対）' +
      (hasReferenceVar ? ' ／ 参考=予想スコアには不使用' : '') + '</div>';
    pred.ranked.forEach(function (boatNum, idx) {
      var b = byBoat[boatNum];
      var s = scores[boatNum];
      html += '<div class="boat-row">' +
        '<div class="boat-num ' + boatClass(boatNum) + '">' + boatNum + '</div>' +
        '<div class="boat-name">' + escapeHtml(b && b.name ? b.name : ('' + boatNum)) + '</div>' +
        '<div class="boat-rank">' + (idx + 1) + '位</div></div>';

      html += '<div class="contrib-marks">';
      // 通常変数（重み>0）を先に表示
      CONTRIB_LABELS.forEach(function (cl) {
        if (isReferenceVar(cl.key)) return;
        var mark = zLevelMark(zTable[boatNum][cl.key]);
        html += '<span class="contrib-mark">' +
          '<span class="cm-label">' + escapeHtml(cl.label) + '</span>' +
          '<span class="cm-sym ' + mark.lv + '">' + mark.sym + '</span>' +
          '</span>';
      });
      // 参考変数（重み0）を末尾に薄色でまとめて表示
      var refVars = CONTRIB_LABELS.filter(function (cl) { return isReferenceVar(cl.key); });
      if (refVars.length) {
        html += '<span class="contrib-ref-tag">参考:</span>';
        refVars.forEach(function (cl) {
          var mark = zLevelMark(zTable[boatNum][cl.key]);
          html += '<span class="contrib-mark ref">' +
            '<span class="cm-label">' + escapeHtml(cl.label) + '</span>' +
            '<span class="cm-sym ' + mark.lv + '">' + mark.sym + '</span>' +
            '</span>';
        });
      }
      html += '</div>';

      // 根拠行: ゲージ量（合計スコア）が何で押し上げ/押し下げされたかを言葉と数値で示す。
      var basis = buildBasis(contributions[boatNum], s);
      html += '<div class="basis-row">';
      html += '<div class="basis-summary"><span class="basis-icon">◆</span>' + escapeHtml(basis.summary) + '</div>';
      html += '<details class="basis-detail"><summary>スコア内訳を見る</summary>' +
        '<div class="basis-breakdown">' + escapeHtml(basis.breakdown) + '</div></details>';
      html += '</div>';
    });
    html += '</div>';

    // --- 買い目マス（2列ぶち抜き・bet-line形式） ---
    var folded = foldBets(pred.bets);
    html += '<div class="cell wide" id="bets-box-' + race.number + '"><div class="cell-label">BETS ／ 3連単</div>';
    folded.groups.forEach(function (g) {
      html += '<div class="bet-line"><span class="kind">畳込 ' + g.count + '点</span><b class="num">' + escapeHtml(g.label) + '</b></div>';
    });
    folded.leftover.forEach(function (c) {
      html += '<div class="bet-line"><span class="kind">1点</span><b class="num">' + escapeHtml(c) + '</b></div>';
    });
    html += '<div class="bets-total">合計 ' + folded.total + '点</div>';
    html += '<details class="bets-detail"><summary>個別8点をコピー用に表示</summary><div class="bets-raw num">' + pred.bets.join('\n') + '</div></details>';
    html += '<button class="copy-btn" id="copy-btn-' + race.number + '">買い目をコピー</button>';
    html += '</div>';

    // --- 選手名鑑マス（艇番順・小マス） ---
    race.boats.forEach(function (b) { html += renderRacerCell(race, b); });

    html += '</div>';
    detailContainer.innerHTML = html;
    activateBento(detailContainer);
    bindDetailHandlers(race, pred);
  }

  // イベントハンドラの結線（renderDetailから呼ぶ）。展示待ち時はpred未指定・買い目ボタン無し。
  function bindDetailHandlers(race, pred) {
    var beforeInfoBtn = document.getElementById('beforeinfo-btn-' + race.number);
    if (beforeInfoBtn) {
      beforeInfoBtn.addEventListener('click', function () {
        var statusEl = document.getElementById('beforeinfo-status-' + race.number);
        beforeInfoBtn.disabled = true;
        if (statusEl) { statusEl.textContent = '取得中…'; statusEl.className = 'status-line'; }
        fetchBeforeInfoJson(state.dateStr, race.number, function () {
          if (statusEl) { statusEl.textContent = '外部中継サーバーへ接続中…（目覚め待ちで少しかかることがあります）'; statusEl.className = 'status-line'; }
        })
          .then(function (json) {
            if (!json || json.ok !== true) {
              var reason = json && json.error ? json.error : 'unknown';
              if (statusEl) { statusEl.textContent = '直前情報を取得できませんでした（' + reason + '）。中継サーバー未起動の可能性があります。'; statusEl.className = 'status-line err'; }
              beforeInfoBtn.disabled = false;
              return;
            }
            var applied = mergeBeforeInfoExhibition(race, json.data);
            // 天候は展示タイムより先に公開されることがある。取得できた天候は
            // 展示タイムの有無に関わらずwind-info行へ反映する（買い目ロジックには不使用）。
            var weather = json.data && json.data.weather ? json.data.weather : null;
            if (weather) race.beforeInfoWeather = weather;

            if (!applied && !weather) {
              if (statusEl) { statusEl.textContent = '直前情報は取得しましたが展示タイム・天候はまだ未公開でした（展示走行前）。'; statusEl.className = 'status-line warn'; }
              beforeInfoBtn.disabled = false;
              return;
            }
            if (applied) race.beforeInfoApplied = true;
            // 既存の反映パスに乗せて再描画するのみ。寄与表示・選手名鑑・買い目ロジックには触れない。
            // 天候のみ取得（展示走行前）の場合もwind-infoを更新し、ボタンは再取得のため残す。
            renderDetail(race);
          })
          .catch(function (err) {
            if (statusEl) { statusEl.textContent = '直前情報の取得に失敗しました: ' + err.message + '（中継サーバー未起動の可能性があります）'; statusEl.className = 'status-line err'; }
            beforeInfoBtn.disabled = false;
          });
      });
    }

    // 買い目コピーは展示揃い時のみ存在（展示待ちレースにはボタンが無い）。
    var copyBtn = document.getElementById('copy-btn-' + race.number);
    if (copyBtn && pred) {
      copyBtn.addEventListener('click', function () {
        var text = pred.bets.join('\n');
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            copyBtn.textContent = 'コピーしました';
            copyBtn.classList.add('copied');
            setTimeout(function () {
              copyBtn.textContent = '買い目をコピー';
              copyBtn.classList.remove('copied');
            }, 1500);
          });
        }
      });
    }
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // 初期ロード
  loadDate(state.dateStr);

  // node環境での単体検証用にexport（ブラウザでは無視される）
  if (typeof module !== 'undefined' && module.exports) {
    module.exports = { predictRace: predictRace, programBoatToInput: programBoatToInput, applyExhibition: applyExhibition };
  }
})();
</script>
